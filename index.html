<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Obras</title>

<style>

:root {
    --verde-principal: #1f6f54;
    --verde-secundario: #2e8b6f;
    --fondo: #f4f7f5;
    --texto: #1f2d2a;
    --borde: #d0ddd7;
    --blanco: #ffffff;
}

body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: var(--fondo);
    padding: 30px;
}

.container {
    max-width: 950px;
    margin: auto;
    background: var(--blanco);
    padding: 30px;
    border-radius: 12px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 4px 0 10px 0;
    border: 1px solid var(--borde);
    border-radius: 8px;
}

label {
    font-size: 13px;
    color: var(--texto);
    font-weight: 500;
}

textarea { height: 80px; }

button {
    padding: 9px 14px;
    margin-top: 8px;
    border: none;
    background: var(--verde-principal);
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button.secundario { background: #6c757d; }
button.eliminar { background: #d9534f; }

.proyecto {
    border: 1px solid var(--borde);
    padding: 18px;
    margin-top: 15px;
    border-radius: 12px;
}

#modalResponsable,
#modalInfoProyecto {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: white;
    padding: 22px;
    margin: 6% auto;
    width: 380px;
    border-radius: 12px;
}

</style>
</head>

<body>

<div class="container">

<h2>Registro de Proyecto</h2>

<input id="nombreProyecto" placeholder="Nombre del proyecto">
<input id="ubicacion" placeholder="Ubicación">

<select id="tipoVivienda">
<option value="">Seleccione tipo de vivienda</option>
<option value="VIS">VIS</option>
<option value="NO VIS">NO VIS</option>
<option value="VIP">VIP</option>
</select>

<button onclick="guardarProyecto()">Guardar Proyecto</button>

<hr>

<h3>Filtros</h3>

<select id="filtroProyecto" onchange="aplicarFiltros()">
<option value="">Todos los proyectos</option>
</select>

<input id="buscadorResponsable" placeholder="Buscar responsable..." oninput="aplicarFiltros()">

<hr>

<h3>Proyectos registrados</h3>
<div id="listaProyectos"></div>

</div>

<!-- MODAL INFO PROYECTO -->
<div id="modalInfoProyecto">
<div class="modal-content">

<h3>Información del Proyecto</h3>

<label>Ubicación</label>
<input id="infoUbicacion" placeholder="Ej: Bogotá Norte">

<label>Cluster</label>
<input id="infoCluster" placeholder="Ej: Cluster 1">

<label>Avance del proyecto (%)</label>
<input id="infoAvance" placeholder="Ej: 45%">

<label>Día comité</label>
<input id="infoDiaComite" placeholder="Ej: Lunes">

<label>Hora comité</label>
<input id="infoHoraComite" placeholder="Ej: 08:00 AM">

<label>Día PAC</label>
<input id="infoDiaPAC" placeholder="Ej: Miércoles">

<label>Hora PAC</label>
<input id="infoHoraPAC" placeholder="Ej: 02:00 PM">

<label>Observaciones</label>
<textarea id="infoObservaciones" placeholder="Notas generales del proyecto..."></textarea>

<button onclick="guardarInfoProyecto()">Guardar</button>
<button class="secundario" onclick="cerrarModalInfo()">Cancelar</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBYtDX-iqSpAIRtDRnp8c-2XLhmPyR-ePU",
authDomain: "controlobras-5411a-85cf2.firebaseapp.com",
projectId: "controlobras-5411a-85cf2",
storageBucket: "controlobras-5411a-85cf2.firebasestorage.app",
messagingSenderId: "439125911053",
appId: "1:439125911053:web:f93c17f3498d70ad9e5744"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let proyectosData = [];
let proyectoActual = null;

window.guardarProyecto = async function () {

if (!nombreProyecto.value || !ubicacion.value || !tipoVivienda.value) return;

await addDoc(collection(db,"proyectos"),{
nombreProyecto: nombreProyecto.value,
ubicacion: ubicacion.value,
tipoVivienda: tipoVivienda.value,
cluster:"",
avance:"",
diaComite:"",
horaComite:"",
diaPAC:"",
horaPAC:"",
observaciones:"",
fecha: new Date()
});

cargarProyectos();
};

async function cargarProyectos() {
const snapshot = await getDocs(collection(db,"proyectos"));
proyectosData = [];
snapshot.forEach(d => proyectosData.push({id:d.id,...d.data()}));
llenarFiltro();
renderizar(proyectosData);
}

function llenarFiltro() {
filtroProyecto.innerHTML = '<option value="">Todos los proyectos</option>';
proyectosData.forEach(p => {
filtroProyecto.innerHTML += `<option value="${p.id}">${p.nombreProyecto}</option>`;
});
}

window.aplicarFiltros = function () {
let lista = proyectosData;

if (filtroProyecto.value)
lista = lista.filter(p => p.id === filtroProyecto.value);

const texto = buscadorResponsable.value.toLowerCase();

if (texto) {
lista = lista.filter(p =>
(p.responsables || []).some(r =>
(r.nombre || "").toLowerCase().includes(texto)
)
);
}

renderizar(lista);
};

function renderizar(lista) {

listaProyectos.innerHTML = "";

lista.forEach(p => {

listaProyectos.innerHTML += `
<div class="proyecto">
<strong>${p.nombreProyecto}</strong><br>
${p.ubicacion} - ${p.tipoVivienda}<br>

<button onclick="abrirModalInfo('${p.id}')">Información del proyecto</button>
</div>`;
});
}

window.abrirModalInfo = function(id) {
proyectoActual = id;
const p = proyectosData.find(x => x.id === id);

infoUbicacion.value = p.ubicacion || "";
infoCluster.value = p.cluster || "";
infoAvance.value = p.avance || "";
infoDiaComite.value = p.diaComite || "";
infoHoraComite.value = p.horaComite || "";
infoDiaPAC.value = p.diaPAC || "";
infoHoraPAC.value = p.horaPAC || "";
infoObservaciones.value = p.observaciones || "";

modalInfoProyecto.style.display = "block";
};

window.cerrarModalInfo = function() {
modalInfoProyecto.style.display = "none";
};

window.guardarInfoProyecto = async function () {

await updateDoc(doc(db,"proyectos",proyectoActual),{
ubicacion: infoUbicacion.value,
cluster: infoCluster.value,
avance: infoAvance.value,
diaComite: infoDiaComite.value,
horaComite: infoHoraComite.value,
diaPAC: infoDiaPAC.value,
horaPAC: infoHoraPAC.value,
observaciones: infoObservaciones.value
});

cerrarModalInfo();
cargarProyectos();
};

cargarProyectos();

</script>

</body>
</html>
