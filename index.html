<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Obras</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f6f8;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        input {
            padding: 10px;
            margin-top: 10px;
            width: 250px;
        }
        button {
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Hola Mundo 👷‍♂️</h1>
        <p>ControlObras + Firebase</p>

        <input type="text" id="datoInput" placeholder="Escribe un dato">
        <br>
        <button onclick="guardarDato()">Guardar en Firebase</button>
    </div>

    <!-- Firebase SDK (VERSIÓN CORRECTA PARA HTML ESTÁTICO) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // TU CONFIG (ya correcta)
        const firebaseConfig = {
            apiKey: "AIzaSyBb2bbSwa6onpXX23GPhd2F9Pk7GM-76tY",
            authDomain: "controlobras-5411a.firebaseapp.com",
            projectId: "controlobras-5411a",
            storageBucket: "controlobras-5411a.firebasestorage.app",
            messagingSenderId: "329199596033",
            appId: "1:329199596033:web:f9b032df792582f7644600"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Función global para el botón
        window.guardarDato = async function () {
            const valor = document.getElementById("datoInput").value;

            if (!valor) {
                alert("Ingresa un dato");
                return;
            }

            try {
                await addDoc(collection(db, "pruebas"), {
                    texto: valor,
                    fecha: new Date()
                });

                alert("Dato guardado correctamente");
                document.getElementById("datoInput").value = "";

            } catch (error) {
                console.error("Error:", error);
                alert("Error al guardar");
            }
        };
    </script>

</body>
</html>
