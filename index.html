<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Obras</title>

<style>

/* ===== BASE ===== */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0f1a14;
    color: #d8e3dc;
    padding: 30px;
}

/* ===== TITULOS ===== */
h2, h3 {
    color: #a3c9a8;
    margin-bottom: 10px;
}

/* ===== INPUTS ===== */
input, select {
    width: 300px;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid rgba(163, 201, 168, 0.3);
    background: rgba(255,255,255,0.03);
    color: #d8e3dc;
    border-radius: 6px;
    outline: none;
}

input:focus, select:focus {
    border-color: #6b8f71;
}

/* ===== BOTONES ===== */
button {
    padding: 8px 12px;
    margin-top: 8px;
    border: 1px solid rgba(163, 201, 168, 0.4);
    background: rgba(163, 201, 168, 0.05);
    color: #a3c9a8;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
}

button:hover {
    background: rgba(163, 201, 168, 0.15);
    border-color: #a3c9a8;
}

/* ===== TARJETAS ===== */
.proyecto {
    border: 1px solid rgba(163, 201, 168, 0.2);
    background: rgba(255,255,255,0.02);
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
    backdrop-filter: blur(6px);
}

/* ===== LISTA ===== */
ul {
    margin-top: 10px;
    padding-left: 20px;
}

li {
    margin-bottom: 5px;
}

/* ===== DIVISORES ===== */
hr {
    border: none;
    border-top: 1px solid rgba(163, 201, 168, 0.2);
    margin: 25px 0;
}

/* ===== MODAL ===== */
#modalResponsable {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: #16251d;
    padding: 20px;
    margin: 8% auto;
    width: 320px;
    border-radius: 10px;
    border: 1px solid rgba(163, 201, 168, 0.2);
}

/* ===== CONTENEDOR ===== */
.container {
    max-width: 900px;
    margin: auto;
}

</style>
</head>

<body>

<div class="container">

<h2>Registro de Proyecto</h2>

<input id="nombreProyecto" placeholder="Nombre del proyecto">
<input id="ubicacion" placeholder="Ubicación">
<input id="tipoVivienda" placeholder="Tipo de vivienda">

<button onclick="guardarProyecto()">Guardar Proyecto</button>

<hr>

<h3>Filtros</h3>

<select id="filtroProyecto" onchange="aplicarFiltros()">
    <option value="">Todos los proyectos</option>
</select>

<input id="buscadorResponsable" placeholder="Buscar responsable..." oninput="aplicarFiltros()">

<hr>

<h3>Proyectos registrados</h3>
<div id="listaProyectos"></div>

</div>

<!-- MODAL -->
<div id="modalResponsable">
  <div class="modal-content">

    <h3>Agregar Responsable</h3>

    <input id="modalNombre" placeholder="Nombre">

    <select id="modalCargo">
      <option value="">Selecciona cargo</option>
      <option>Gerente de Construcción</option>
      <option>Subgerente de Construcción</option>
      <option>Director de Obra</option>
      <option>Residente de obra</option>
      <option>Residente Administrativo</option>
      <option>Residente de Control</option>
      <option>Residente BIM</option>
      <option>SYST</option>
    </select>

    <input id="modalCorreo" placeholder="Correo">

    <button onclick="guardarDesdeModal()">Guardar</button>
    <button onclick="cerrarModal()">Cancelar</button>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, arrayUnion, arrayRemove } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBYtDX-iqSpAIRtDRnp8c-2XLhmPyR-ePU",
    authDomain: "controlobras-5411a-85cf2.firebaseapp.com",
    projectId: "controlobras-5411a-85cf2",
    storageBucket: "controlobras-5411a-85cf2.firebasestorage.app",
    messagingSenderId: "439125911053",
    appId: "1:439125911053:web:f93c17f3498d70ad9e5744"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let proyectosData = [];
let proyectoActual = null;

window.guardarProyecto = async function () {
    if (!nombreProyecto.value || !ubicacion.value || !tipoVivienda.value) return;

    await addDoc(collection(db, "proyectos"), {
        nombreProyecto: nombreProyecto.value,
        ubicacion: ubicacion.value,
        tipoVivienda: tipoVivienda.value,
        responsables: [],
        fecha: new Date()
    });

    cargarProyectos();
};

async function cargarProyectos() {
    const snapshot = await getDocs(collection(db, "proyectos"));
    proyectosData = [];
    snapshot.forEach(d => proyectosData.push({ id: d.id, ...d.data() }));
    llenarFiltro();
    renderizar(proyectosData);
}

function llenarFiltro() {
    filtroProyecto.innerHTML = '<option value="">Todos los proyectos</option>';
    proyectosData.forEach(p => {
        filtroProyecto.innerHTML += `<option value="${p.id}">${p.nombreProyecto}</option>`;
    });
}

window.aplicarFiltros = function () {
    let lista = proyectosData;
    if (filtroProyecto.value) lista = lista.filter(p => p.id === filtroProyecto.value);

    const texto = buscadorResponsable.value.toLowerCase();
    if (texto) {
        lista = lista.filter(p =>
            p.responsables?.some(r =>
                r.nombre.toLowerCase().includes(texto) ||
                r.cargo.toLowerCase().includes(texto) ||
                r.correo.toLowerCase().includes(texto)
            )
        );
    }

    renderizar(lista);
};

function renderizar(lista) {
    listaProyectos.innerHTML = "";

    lista.forEach(p => {
        let responsablesHTML = p.responsables?.map(r =>
            `<li>${r.nombre} - ${r.cargo}
             <button onclick='eliminarResponsable("${p.id}", "${r.nombre}", "${r.cargo}", "${r.correo}")'>Eliminar</button></li>`
        ).join("") || "<li>Sin responsables</li>";

        listaProyectos.innerHTML += `
            <div class="proyecto">
                <strong>${p.nombreProyecto}</strong><br>
                ${p.ubicacion} - ${p.tipoVivienda}<br>
                <button onclick="abrirModal('${p.id}')">Agregar responsable</button>
                <ul>${responsablesHTML}</ul>
            </div>`;
    });
}

window.abrirModal = function(id) {
    proyectoActual = id;
    modalResponsable.style.display = "block";
};

window.cerrarModal = function() {
    modalResponsable.style.display = "none";
};

window.guardarDesdeModal = async function () {
    if (!modalNombre.value || !modalCargo.value || !modalCorreo.value) return;

    await updateDoc(doc(db, "proyectos", proyectoActual), {
        responsables: arrayUnion({
            nombre: modalNombre.value,
            cargo: modalCargo.value,
            correo: modalCorreo.value
        })
    });

    cerrarModal();
    cargarProyectos();
};

window.eliminarResponsable = async function (id, nombre, cargo, correo) {
    await updateDoc(doc(db, "proyectos", id), {
        responsables: arrayRemove({ nombre, cargo, correo })
    });
    cargarProyectos();
};

cargarProyectos();

</script>

</body>
</html>
