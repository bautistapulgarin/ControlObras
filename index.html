<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyectos de Obra</title>

<style>
body { font-family: Arial; padding: 20px; }
input { display: block; margin: 5px 0; padding: 8px; width: 300px; }
button { margin-top: 10px; padding: 8px; }
.responsable { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
</style>
</head>

<body>

<h2>Registro de Proyecto</h2>

<input type="text" id="nombreProyecto" placeholder="Nombre del proyecto">
<input type="text" id="ubicacion" placeholder="Ubicación">
<input type="text" id="tipoVivienda" placeholder="Tipo de vivienda">

<h3>Responsables</h3>
<div id="responsablesContainer"></div>

<button onclick="agregarResponsable()">➕ Agregar responsable</button>
<br><br>

<button onclick="guardarProyecto()">Guardar Proyecto</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBYtDX-iqSpAIRtDRnp8c-2XLhmPyR-ePU",
    authDomain: "controlobras-5411a-85cf2.firebaseapp.com",
    projectId: "controlobras-5411a-85cf2",
    storageBucket: "controlobras-5411a-85cf2.firebasestorage.app",
    messagingSenderId: "439125911053",
    appId: "1:439125911053:web:f93c17f3498d70ad9e5744"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔹 Agregar responsable dinámico
window.agregarResponsable = function () {
    const container = document.getElementById("responsablesContainer");

    const div = document.createElement("div");
    div.classList.add("responsable");

    div.innerHTML = `
        <input type="text" placeholder="Nombre" class="nombre">
        <input type="text" placeholder="Cargo" class="cargo">
        <input type="email" placeholder="Correo" class="correo">
    `;

    container.appendChild(div);
};

// 🔹 Guardar proyecto
window.guardarProyecto = async function () {

    const nombreProyecto = document.getElementById("nombreProyecto").value;
    const ubicacion = document.getElementById("ubicacion").value;
    const tipoVivienda = document.getElementById("tipoVivienda").value;

    const responsablesHTML = document.querySelectorAll(".responsable");

    let responsables = [];

    responsablesHTML.forEach(div => {
        const nombre = div.querySelector(".nombre").value;
        const cargo = div.querySelector(".cargo").value;
        const correo = div.querySelector(".correo").value;

        if (nombre && cargo && correo) {
            responsables.push({ nombre, cargo, correo });
        }
    });

    try {
        await addDoc(collection(db, "proyectos"), {
            nombreProyecto,
            ubicacion,
            tipoVivienda,
            responsables,
            fecha: new Date()
        });

        alert("Proyecto guardado");

    } catch (error) {
        console.error(error);
        alert("Error al guardar");
    }
};
</script>

</body>
</html>
