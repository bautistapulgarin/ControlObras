<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Obras</title>

<style>

:root {
    --verde-principal: #1f6f54;
    --verde-secundario: #2e8b6f;
    --fondo: #f4f7f5;
    --texto: #1f2d2a;
    --borde: #d0ddd7;
    --blanco: #ffffff;
}

body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: var(--fondo);
    padding: 30px;
}

.container {
    max-width: 950px;
    margin: auto;
    background: var(--blanco);
    padding: 30px;
    border-radius: 12px;
}

input, select, textarea {
    width: 300px;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid var(--borde);
    border-radius: 8px;
}

textarea {
    height: 80px;
}

button {
    padding: 9px 14px;
    margin-top: 8px;
    border: none;
    background: var(--verde-principal);
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button.secundario { background: #6c757d; }
button.eliminar { background: #d9534f; }

.proyecto {
    border: 1px solid var(--borde);
    padding: 18px;
    margin-top: 15px;
    border-radius: 12px;
}

#modalResponsable,
#modalInfoProyecto {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: white;
    padding: 22px;
    margin: 8% auto;
    width: 360px;
    border-radius: 12px;
}

</style>
</head>

<body>

<div class="container">

<h2>Registro de Proyecto</h2>

<input id="nombreProyecto" placeholder="Nombre del proyecto"><br>
<input id="ubicacion" placeholder="Ubicación"><br>

<select id="tipoVivienda">
<option value="">Seleccione tipo de vivienda</option>
<option value="VIS">VIS</option>
<option value="NO VIS">NO VIS</option>
<option value="VIP">VIP</option>
</select><br>

<button onclick="guardarProyecto()">Guardar Proyecto</button>

<hr>

<h3>Proyectos registrados</h3>
<div id="listaProyectos"></div>

</div>

<!-- MODAL RESPONSABLE -->
<div id="modalResponsable">
<div class="modal-content">

<h3>Agregar Responsable</h3>

<input id="modalNombre" placeholder="Nombre"><br>

<select id="modalCargo">
<option value="">Selecciona cargo</option>
<option>Gerente de Construcción</option>
<option>Subgerente de Construcción</option>
<option>Director de Obra</option>
<option>Residente de obra</option>
<option>Residente Administrativo</option>
<option>Residente de Control</option>
<option>Residente BIM</option>
<option>SYST</option>
</select><br>

<input id="modalCorreo" placeholder="Correo"><br>

<button onclick="guardarDesdeModal()">Guardar</button>
<button class="secundario" onclick="cerrarModal()">Cancelar</button>

</div>
</div>

<!-- MODAL INFO PROYECTO -->
<div id="modalInfoProyecto">
<div class="modal-content">

<h3>Información del Proyecto</h3>

<input id="infoUbicacion" placeholder="Ubicación"><br>
<input id="infoCluster" placeholder="Cluster"><br>
<input id="infoAvance" placeholder="Avance de proyecto"><br>
<input id="infoDiaComite" placeholder="Día comité"><br>
<input id="infoHoraComite" placeholder="Hora comité"><br>
<input id="infoDiaPAC" placeholder="Día PAC"><br>
<input id="infoHoraPAC" placeholder="Hora PAC"><br>

<textarea id="infoObservaciones" placeholder="Observaciones"></textarea>

<button onclick="guardarInfoProyecto()">Guardar</button>
<button class="secundario" onclick="cerrarModalInfo()">Cancelar</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBYtDX-iqSpAIRtDRnp8c-2XLhmPyR-ePU",
authDomain: "controlobras-5411a-85cf2.firebaseapp.com",
projectId: "controlobras-5411a-85cf2",
storageBucket: "controlobras-5411a-85cf2.firebasestorage.app",
messagingSenderId: "439125911053",
appId: "1:439125911053:web:f93c17f3498d70ad9e5744"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let proyectosData = [];
let proyectoActual = null;

window.guardarProyecto = async function () {
try {
if (!nombreProyecto.value || !ubicacion.value || !tipoVivienda.value) return;

await addDoc(collection(db,"proyectos"),{
nombreProyecto: nombreProyecto.value,
ubicacion: ubicacion.value,
tipoVivienda: tipoVivienda.value,
responsables: [],
cluster:"",
avance:"",
diaComite:"",
horaComite:"",
diaPAC:"",
horaPAC:"",
observaciones:"",
fecha: new Date()
});

cargarProyectos();

} catch(e) {
console.error("Error guardando:", e);
}
};

async function cargarProyectos() {
const snapshot = await getDocs(collection(db,"proyectos"));
proyectosData = [];
snapshot.forEach(d => proyectosData.push({id:d.id,...d.data()}));
renderizar(proyectosData);
}

function renderizar(lista) {

listaProyectos.innerHTML = "";

lista.forEach(p => {

let responsablesHTML = p.responsables?.map(r =>
`<li>${r.nombre} - ${r.cargo}
<button class="eliminar"
onclick='eliminarResponsable("${p.id}","${r.nombre}","${r.cargo}","${r.correo}")'>
Eliminar</button></li>`
).join("") || "<li>Sin responsables</li>";

listaProyectos.innerHTML += `
<div class="proyecto">
<strong>${p.nombreProyecto}</strong><br>
${p.ubicacion} - ${p.tipoVivienda}<br>

<small>
Cluster: ${p.cluster || "-"} |
Avance: ${p.avance || "-"}<br>
Comité: ${p.diaComite || "-"} ${p.horaComite || ""}<br>
PAC: ${p.diaPAC || "-"} ${p.horaPAC || ""}<br>
Observaciones: ${p.observaciones || "-"}
</small><br><br>

<button onclick="abrirModal('${p.id}')">Agregar responsable</button>
<button onclick="abrirModalInfo('${p.id}')">Información del proyecto</button>

<ul>${responsablesHTML}</ul>
</div>`;
});
}

/* ===== RESPONSABLES ===== */

window.abrirModal = function(id) {
proyectoActual = id;
modalResponsable.style.display = "block";
};

window.cerrarModal = function() {
modalResponsable.style.display = "none";
};

window.guardarDesdeModal = async function () {
try {
if (!modalNombre.value || !modalCargo.value || !modalCorreo.value) return;

await updateDoc(doc(db,"proyectos",proyectoActual),{
responsables: arrayUnion({
nombre: modalNombre.value,
cargo: modalCargo.value,
correo: modalCorreo.value
})
});

cerrarModal();
cargarProyectos();

} catch(e) {
console.error("Error responsable:", e);
}
};

window.eliminarResponsable = async function(id,nombre,cargo,correo) {
try {
await updateDoc(doc(db,"proyectos",id),{
responsables: arrayRemove({nombre,cargo,correo})
});
cargarProyectos();
} catch(e) {
console.error("Error eliminando:", e);
}
};

/* ===== INFO PROYECTO ===== */

window.abrirModalInfo = function(id) {
proyectoActual = id;
const p = proyectosData.find(x => x.id === id);

infoUbicacion.value = p.ubicacion || "";
infoCluster.value = p.cluster || "";
infoAvance.value = p.avance || "";
infoDiaComite.value = p.diaComite || "";
infoHoraComite.value = p.horaComite || "";
infoDiaPAC.value = p.diaPAC || "";
infoHoraPAC.value = p.horaPAC || "";
infoObservaciones.value = p.observaciones || "";

modalInfoProyecto.style.display = "block";
};

window.cerrarModalInfo = function() {
modalInfoProyecto.style.display = "none";
};

window.guardarInfoProyecto = async function () {
try {
await updateDoc(doc(db,"proyectos",proyectoActual),{
ubicacion: infoUbicacion.value,
cluster: infoCluster.value,
avance: infoAvance.value,
diaComite: infoDiaComite.value,
horaComite: infoHoraComite.value,
diaPAC: infoDiaPAC.value,
horaPAC: infoHoraPAC.value,
observaciones: infoObservaciones.value
});

cerrarModalInfo();
cargarProyectos();

} catch(e) {
console.error("Error info proyecto:", e);
}
};

cargarProyectos();

</script>

</body>
</html>
