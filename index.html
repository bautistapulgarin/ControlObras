<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Obras - Ingeurbe</title>

    <style>
        :root {
            --verde-principal: #1f6f54;
            --fondo: #f4f7f5;
            --borde: #d0ddd7;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--fondo);
            padding: 20px;
            margin: 0;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background: var(--blanco);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* Contenedor del Logo */
        .header-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-logo {
            max-width: 280px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        h2, h3 {
            color: var(--verde-principal);
            border-bottom: 2px solid var(--borde);
            padding-bottom: 8px;
            margin-top: 25px;
        }

        /* Formulario y Inputs */
        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--borde);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            padding: 12px 20px;
            background: var(--verde-principal);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        /* Lista de Proyectos */
        .proyecto {
            border-left: 5px solid var(--verde-principal);
            background: #fff;
            padding: 20px;
            margin-top: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .proyecto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .proyecto-titulo {
            font-size: 1.2em;
            color: var(--verde-principal);
        }

        /* Modales */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            border-radius: 12px;
        }

        @media (max-width: 600px) {
            .form-group { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<div class="container">
    
    <div class="header-box">
        <img src="https://ingeurbe-my.sharepoint.com/personal/cpulgarin_construccion_com_co/_layouts/15/download.aspx?UniqueId=86c2f47b-cd5b-429b-8257-d6554033c13a" 
             alt="Logo Viale 26 - Ingeurbe" 
             class="header-logo">
    </div>

    <h2>Registro de Control de Obras</h2>

    <div class="form-group">
        <input id="nombreProyecto" placeholder="Nombre del Proyecto">
        <input id="ubicacion" placeholder="Ubicación">
    </div>

    <select id="tipoVivienda" style="margin-bottom: 15px;">
        <option value="">Seleccione tipo de vivienda...</option>
        <option>VIS</option>
        <option>NO VIS</option>
        <option>VIP</option>
    </select>

    <button onclick="guardarProyecto()" style="width: 100%;">Guardar Nuevo Proyecto</button>

    <hr style="margin: 30px 0; opacity: 0.3;">

    <h3>Filtros de Búsqueda</h3>
    <div class="form-group">
        <select id="filtroProyecto" onchange="aplicarFiltros()"></select>
        <select id="filtroCargo" onchange="aplicarFiltros()">
            <option value="">Todos los cargos</option>
        </select>
    </div>
    <input id="buscadorResponsable" placeholder="🔍 Buscar por nombre o correo..." oninput="aplicarFiltros()" style="margin-bottom: 10px;">
    
    <button onclick="copiarCorreos()" style="background: #4a5568; font-size: 0.9em;">📋 Copiar correos visibles</button>

    <div id="listaProyectos"></div>
</div>

<div id="modalResponsable" class="modal">
    <div class="modal-content">
        <h3>Añadir Responsable</h3>
        <input id="modalNombre" placeholder="Nombre completo">
        <input id="modalCargo" placeholder="Cargo (Ej. Residente, Director)">
        <input id="modalCorreo" placeholder="Correo electrónico">
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button onclick="guardarResponsable()" style="flex:1;">Guardar</button>
            <button onclick="cerrarModal()" style="background:#e53e3e; flex:1;">Cancelar</button>
        </div>
    </div>
</div>

<div id="modalInfoProyecto" class="modal">
    <div class="modal-content" style="max-width: 550px;">
        <h3>Detalles del Proyecto</h3>
        <div class="form-group">
            <input id="infoUbicacion" placeholder="Ubicación">
            <input id="infoCluster" placeholder="Cluster">
        </div>
        <input id="infoAvance" placeholder="Porcentaje de Avance">
        <div class="form-group">
            <input id="infoDiaComite" placeholder="Día Comité">
            <input id="infoHoraComite" placeholder="Hora Comité">
        </div>
        <div class="form-group">
            <input id="infoDiaPAC" placeholder="Día PAC">
            <input id="infoHoraPAC" placeholder="Hora PAC">
        </div>
        <textarea id="infoObservaciones" rows="4" placeholder="Observaciones adicionales"></textarea>

        <div style="margin-top:15px; display:flex; gap:10px;">
            <button onclick="guardarInfoProyecto()" style="flex:1;">Actualizar Datos</button>
            <button onclick="cerrarModalInfo()" style="background:#718096; flex:1;">Cerrar</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBYtDX-iqSpAIRtDRnp8c-2XLhmPyR-ePU",
        authDomain: "controlobras-5411a-85cf2.firebaseapp.com",
        projectId: "controlobras-5411a-85cf2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let proyectosData = [];
    let listaFiltrada = [];
    let proyectoActual = null;

    // Cargar datos al iniciar
    window.onload = () => cargarProyectos();

    async function cargarProyectos() {
        const snap = await getDocs(collection(db,"proyectos"));
        proyectosData = [];
        snap.forEach(d => proyectosData.push({id:d.id,...d.data()}));
        listaFiltrada = proyectosData;
        llenarFiltroProyecto();
        llenarFiltroCargo();
        renderizar(listaFiltrada);
    }

    window.guardarProyecto = async () => {
        if (!nombreProyecto.value) return alert("Escribe el nombre del proyecto");
        await addDoc(collection(db,"proyectos"),{
            nombreProyecto: nombreProyecto.value,
            ubicacion: ubicacion.value,
            tipoVivienda: tipoVivienda.value,
            responsables: [],
            cluster:"", avance:"", diaComite:"", horaComite:"", diaPAC:"", horaPAC:"", observaciones:""
        });
        nombreProyecto.value = ""; ubicacion.value = "";
        cargarProyectos();
    };

    function llenarFiltroProyecto() {
        filtroProyecto.innerHTML = '<option value="">Todos los proyectos</option>';
        proyectosData.forEach(p => {
            filtroProyecto.innerHTML += `<option value="${p.id}">${p.nombreProyecto}</option>`;
        });
    }

    function llenarFiltroCargo() {
        let cargos = new Set();
        proyectosData.forEach(p => (p.responsables||[]).forEach(r => r.cargo && cargos.add(r.cargo)));
        filtroCargo.innerHTML = '<option value="">Todos los cargos</option>';
        cargos.forEach(c => filtroCargo.innerHTML += `<option value="${c}">${c}</option>`);
    }

    window.aplicarFiltros = () => {
        let lista = proyectosData;
        if (filtroProyecto.value) lista = lista.filter(p => p.id === filtroProyecto.value);
        
        let txt = buscadorResponsable.value.toLowerCase();
        let cargo = filtroCargo.value;

        if (txt || cargo) {
            lista = lista.filter(p => 
                (p.responsables||[]).some(r => {
                    let cumpleTexto = !txt || r.nombre?.toLowerCase().includes(txt) || r.correo?.toLowerCase().includes(txt);
                    let cumpleCargo = !cargo || r.cargo === cargo;
                    return cumpleTexto && cumpleCargo;
                })
            );
        }
        listaFiltrada = lista;
        renderizar(lista);
    };

    function renderizar(lista) {
        listaProyectos.innerHTML = "";
        lista.forEach(p => {
            let respHtml = (p.responsables||[]).map(r => 
                `<li><strong>${r.nombre}</strong> - <span style="color:#666">${r.cargo}</span></li>`
            ).join("") || "<li>Sin responsables</li>";

            listaProyectos.innerHTML += `
                <div class="proyecto">
                    <div class="proyecto-header">
                        <span class="proyecto-titulo"><strong>${p.nombreProyecto}</strong></span>
                        <div>
                            <button onclick="abrirModal('${p.id}')" style="font-size:12px; padding:6px 10px;">+ Responsable</button>
                            <button onclick="abrirModalInfo('${p.id}')" style="font-size:12px; padding:6px 10px; background:#2d3748;">Detalles</button>
                        </div>
                    </div>
                    <ul style="padding-left:20px; font-size:14px; color:#444;">${respHtml}</ul>
                </div>`;
        });
    }

    window.copiarCorreos = () => {
        let correos = new Set();
        listaFiltrada.forEach(p => (p.responsables||[]).forEach(r => r.correo && correos.add(r.correo)));
        navigator.clipboard.writeText(Array.from(correos).join("; "));
        alert("Correos copiados correctamente");
    };

    window.abrirModal = id => { proyectoActual = id; modalResponsable.style.display="block"; };
    window.cerrarModal = () => { modalResponsable.style.display="none"; };

    window.guardarResponsable = async () => {
        if(!modalNombre.value || !modalCorreo.value) return alert("Completa nombre y correo");
        await updateDoc(doc(db,"proyectos",proyectoActual),{
            responsables: arrayUnion({ nombre: modalNombre.value, cargo: modalCargo.value, correo: modalCorreo.value })
        });
        modalNombre.value=""; modalCargo.value=""; modalCorreo.value="";
        cerrarModal();
        cargarProyectos();
    };

    window.abrirModalInfo = id => {
        proyectoActual = id;
        let p = proyectosData.find(x => x.id === id);
        infoUbicacion.value = p.ubicacion || "";
        infoCluster.value = p.cluster || "";
        infoAvance.value = p.avance || "";
        infoDiaComite.value = p.diaComite || "";
        infoHoraComite.value = p.horaComite || "";
        infoDiaPAC.value = p.diaPAC || "";
        infoHoraPAC.value = p.horaPAC || "";
        infoObservaciones.value = p.observaciones || "";
        modalInfoProyecto.style.display = "block";
    };

    window.cerrarModalInfo = () => { modalInfoProyecto.style.display="none"; };

    window.guardarInfoProyecto = async () => {
        await updateDoc(doc(db,"proyectos",proyectoActual),{
            ubicacion: infoUbicacion.value,
            cluster: infoCluster.value,
            avance: infoAvance.value,
            diaComite: infoDiaComite.value,
            horaComite: infoHoraComite.value,
            diaPAC: infoDiaPAC.value,
            horaPAC: infoHoraPAC.value,
            observaciones: infoObservaciones.value
        });
        cerrarModalInfo();
        cargarProyectos();
    };

</script>

</body>
</html>
