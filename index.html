<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL OBRAS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f6f8;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        input {
            padding: 10px;
            margin-top: 10px;
            width: 250px;
        }
        button {
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Hola Mundo 👷‍♂️</h1>
        <p>ControlObras + Firebase</p>

        <input type="text" id="datoInput" placeholder="Escribe un dato">
        <br>
        <button onclick="guardarDato()">Guardar en Firebase</button>
    </div>

    <script type="module">
        // IMPORTS correctos para HTML estático
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // CONFIG DEL NUEVO PROYECTO
        const firebaseConfig = {
            apiKey: "AIzaSyBYtDX-iqSpAIRtDRnp8c-2XLhmPyR-ePU",
            authDomain: "controlobras-5411a-85cf2.firebaseapp.com",
            projectId: "controlobras-5411a-85cf2",
            storageBucket: "controlobras-5411a-85cf2.firebasestorage.app",
            messagingSenderId: "439125911053",
            appId: "1:439125911053:web:f93c17f3498d70ad9e5744"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Función global
        window.guardarDato = async function () {
            const valor = document.getElementById("datoInput").value;

            if (!valor) {
                alert("Ingresa un dato");
                return;
            }

            try {
                await addDoc(collection(db, "pruebas"), {
                    texto: valor,
                    fecha: new Date()
                });

                alert("Dato guardado correctamente");
                document.getElementById("datoInput").value = "";

            } catch (error) {
                console.error("Error:", error);
                alert("Error al guardar");
            }
        };
    </script>

</body>
</html>
