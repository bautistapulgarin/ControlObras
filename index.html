<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Obras</title>

<style>
body { font-family: Arial; padding: 20px; }
input { display: block; margin: 5px 0; padding: 8px; width: 300px; }
button { margin-top: 10px; padding: 8px; cursor: pointer; }
.responsable { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
.proyecto { border: 1px solid #2c3e50; padding: 10px; margin-top: 10px; background: #f4f6f8; }
</style>
</head>

<body>

<h2>Registro de Proyecto</h2>

<input type="text" id="nombreProyecto" placeholder="Nombre del proyecto">
<input type="text" id="ubicacion" placeholder="Ubicación">
<input type="text" id="tipoVivienda" placeholder="Tipo de vivienda">

<h3>Responsables</h3>
<div id="responsablesContainer"></div>

<button onclick="agregarResponsable()">➕ Agregar responsable</button>
<br><br>

<button onclick="guardarProyecto()">Guardar Proyecto</button>

<hr>

<h3>Proyectos registrados</h3>
<div id="listaProyectos"></div>

<script type="module">

// 🔹 IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔹 CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyBYtDX-iqSpAIRtDRnp8c-2XLhmPyR-ePU",
    authDomain: "controlobras-5411a-85cf2.firebaseapp.com",
    projectId: "controlobras-5411a-85cf2",
    storageBucket: "controlobras-5411a-85cf2.firebasestorage.app",
    messagingSenderId: "439125911053",
    appId: "1:439125911053:web:f93c17f3498d70ad9e5744"
};

// 🔹 INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔹 AGREGAR RESPONSABLE
window.agregarResponsable = function () {
    const container = document.getElementById("responsablesContainer");

    const div = document.createElement("div");
    div.classList.add("responsable");

    div.innerHTML = `
        <input type="text" placeholder="Nombre" class="nombre">
        <input type="text" placeholder="Cargo" class="cargo">
        <input type="email" placeholder="Correo" class="correo">
    `;

    container.appendChild(div);
};

// 🔹 GUARDAR PROYECTO
window.guardarProyecto = async function () {

    const nombreProyecto = document.getElementById("nombreProyecto").value;
    const ubicacion = document.getElementById("ubicacion").value;
    const tipoVivienda = document.getElementById("tipoVivienda").value;

    const responsablesHTML = document.querySelectorAll(".responsable");

    let responsables = [];

    responsablesHTML.forEach(div => {
        const nombre = div.querySelector(".nombre").value;
        const cargo = div.querySelector(".cargo").value;
        const correo = div.querySelector(".correo").value;

        if (nombre && cargo && correo) {
            responsables.push({ nombre, cargo, correo });
        }
    });

    try {
        await addDoc(collection(db, "proyectos"), {
            nombreProyecto,
            ubicacion,
            tipoVivienda,
            responsables,
            fecha: new Date()
        });

        alert("Proyecto guardado correctamente");

        // 🔹 LIMPIAR CAMPOS
        document.getElementById("nombreProyecto").value = "";
        document.getElementById("ubicacion").value = "";
        document.getElementById("tipoVivienda").value = "";
        document.getElementById("responsablesContainer").innerHTML = "";

        // 🔹 RECARGAR LISTA
        cargarProyectos();

    } catch (error) {
        console.error(error);
        alert("Error al guardar");
    }
};

// 🔹 CARGAR PROYECTOS
async function cargarProyectos() {

    const contenedor = document.getElementById("listaProyectos");
    contenedor.innerHTML = "Cargando...";

    try {
        const querySnapshot = await getDocs(collection(db, "proyectos"));

        contenedor.innerHTML = "";

        querySnapshot.forEach((doc) => {

            const data = doc.data();

            let responsablesHTML = "";

            if (data.responsables && data.responsables.length > 0) {
                data.responsables.forEach(r => {
                    responsablesHTML += `
                        <li>${r.nombre} - ${r.cargo} - ${r.correo}</li>
                    `;
                });
            }

            contenedor.innerHTML += `
                <div class="proyecto">
                    <strong>${data.nombreProyecto}</strong><br>
                    Ubicación: ${data.ubicacion}<br>
                    Tipo: ${data.tipoVivienda}<br>
                    <ul>${responsablesHTML}</ul>
                </div>
            `;
        });

    } catch (error) {
        console.error(error);
        contenedor.innerHTML = "Error al cargar datos";
    }
}

// 🔹 EJECUTAR AL INICIO
cargarProyectos();

</script>

</body>
</html>
