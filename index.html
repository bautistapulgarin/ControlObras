<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Obras</title>

<style>

:root {
    --verde-principal: #1f6f54;
    --fondo: #f4f7f5;
    --borde: #d0ddd7;
}

body {
    font-family: Arial;
    background: var(--fondo);
    padding: 30px;
}

.container {
    max-width: 950px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}

input, select, textarea {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

button {
    margin-top: 8px;
    padding: 8px;
    background: var(--verde-principal);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.proyecto {
    border: 1px solid var(--borde);
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
}

small {
    display: block;
    margin-top: 5px;
}

#modalResponsable,
#modalInfoProyecto {
    display:none;
    position:fixed;
    top:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background:white;
    margin:5% auto;
    padding:20px;
    width:350px;
}

</style>
</head>

<body>

<div class="container">

<h2>Registro</h2>

<input id="nombreProyecto" placeholder="Nombre">
<input id="ubicacion" placeholder="Ubicación">

<select id="tipoVivienda">
<option value="">Tipo vivienda</option>
<option>VIS</option>
<option>NO VIS</option>
<option>VIP</option>
</select>

<button onclick="guardarProyecto()">Guardar</button>

<hr>

<h3>Filtros</h3>

<select id="filtroProyecto" onchange="aplicarFiltros()"></select>
<input id="buscadorResponsable" placeholder="Buscar responsable" oninput="aplicarFiltros()">

<button onclick="copiarCorreos()">Copiar correos visibles</button>

<hr>

<div id="listaProyectos"></div>

</div>

<!-- MODAL RESPONSABLE -->
<div id="modalResponsable">
<div class="modal-content">
<input id="modalNombre" placeholder="Nombre">
<input id="modalCargo" placeholder="Cargo">
<input id="modalCorreo" placeholder="Correo">

<button onclick="guardarResponsable()">Guardar</button>
<button onclick="cerrarModal()">Cancelar</button>
</div>
</div>

<!-- MODAL INFO -->
<div id="modalInfoProyecto">
<div class="modal-content">

<input id="infoUbicacion" placeholder="Ubicación">
<input id="infoCluster" placeholder="Cluster">
<input id="infoAvance" placeholder="Avance">
<input id="infoDiaComite" placeholder="Día comité">
<input id="infoHoraComite" placeholder="Hora comité">
<input id="infoDiaPAC" placeholder="Día PAC">
<input id="infoHoraPAC" placeholder="Hora PAC">
<textarea id="infoObservaciones" placeholder="Observaciones"></textarea>

<button onclick="guardarInfoProyecto()">Guardar</button>
<button onclick="cerrarModalInfo()">Cancelar</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBYtDX-iqSpAIRtDRnp8c-2XLhmPyR-ePU",
authDomain: "controlobras-5411a-85cf2.firebaseapp.com",
projectId: "controlobras-5411a-85cf2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let proyectosData = [];
let proyectoActual = null;
let listaFiltrada = [];

window.guardarProyecto = async () => {

if (!nombreProyecto.value) return;

await addDoc(collection(db,"proyectos"),{
nombreProyecto: nombreProyecto.value,
ubicacion: ubicacion.value,
tipoVivienda: tipoVivienda.value,
responsables: [],
cluster:"",
avance:"",
diaComite:"",
horaComite:"",
diaPAC:"",
horaPAC:"",
observaciones:""
});

cargarProyectos();
};

async function cargarProyectos() {
const snap = await getDocs(collection(db,"proyectos"));
proyectosData = [];
snap.forEach(d => proyectosData.push({id:d.id,...d.data()}));
llenarFiltro();
renderizar(proyectosData);
}

function llenarFiltro() {
filtroProyecto.innerHTML = '<option value="">Todos</option>';
proyectosData.forEach(p=>{
filtroProyecto.innerHTML += `<option value="${p.id}">${p.nombreProyecto}</option>`;
});
}

window.aplicarFiltros = () => {

let lista = proyectosData;

if (filtroProyecto.value)
lista = lista.filter(p=>p.id === filtroProyecto.value);

let txt = buscadorResponsable.value.toLowerCase();

if (txt) {
lista = lista.filter(p =>
(p.responsables||[]).some(r =>
r.nombre.toLowerCase().includes(txt)
)
);
}

listaFiltrada = lista;
renderizar(lista);
};

function renderizar(lista){

listaProyectos.innerHTML = "";

lista.forEach(p=>{

let resp = (p.responsables||[]).map(r =>
`<li>${r.nombre} - ${r.cargo}</li>`
).join("") || "<li>Sin responsables</li>";

listaProyectos.innerHTML += `
<div class="proyecto">

<strong>${p.nombreProyecto}</strong>

<small>
Ubicación: ${p.ubicacion || "-"}<br>
Cluster: ${p.cluster || "-"}<br>
Avance: ${p.avance || "-"}<br>
Comité: ${p.diaComite || "-"} ${p.horaComite || ""}<br>
PAC: ${p.diaPAC || "-"} ${p.horaPAC || ""}<br>
Obs: ${p.observaciones || "-"}
</small>

<button onclick="abrirModal('${p.id}')">Responsable</button>
<button onclick="abrirModalInfo('${p.id}')">Info</button>

<ul>${resp}</ul>

</div>`;
});
}

/* RESPONSABLE */

window.abrirModal = id=>{
proyectoActual = id;
modalResponsable.style.display="block";
};

window.cerrarModal = ()=> modalResponsable.style.display="none";

window.guardarResponsable = async ()=>{
await updateDoc(doc(db,"proyectos",proyectoActual),{
responsables: arrayUnion({
nombre: modalNombre.value,
cargo: modalCargo.value,
correo: modalCorreo.value
})
});
cerrarModal();
cargarProyectos();
};

/* INFO */

window.abrirModalInfo = id=>{
proyectoActual=id;
let p = proyectosData.find(x=>x.id===id);

infoUbicacion.value = p.ubicacion||"";
infoCluster.value = p.cluster||"";
infoAvance.value = p.avance||"";
infoDiaComite.value = p.diaComite||"";
infoHoraComite.value = p.horaComite||"";
infoDiaPAC.value = p.diaPAC||"";
infoHoraPAC.value = p.horaPAC||"";
infoObservaciones.value = p.observaciones||"";

modalInfoProyecto.style.display="block";
};

window.cerrarModalInfo = ()=> modalInfoProyecto.style.display="none";

window.guardarInfoProyecto = async ()=>{
await updateDoc(doc(db,"proyectos",proyectoActual),{
ubicacion: infoUbicacion.value,
cluster: infoCluster.value,
avance: infoAvance.value,
diaComite: infoDiaComite.value,
horaComite: infoHoraComite.value,
diaPAC: infoDiaPAC.value,
horaPAC: infoHoraPAC.value,
observaciones: infoObservaciones.value
});
cerrarModalInfo();
cargarProyectos();
};

/* COPIAR CORREOS */

window.copiarCorreos = () => {

let correos = [];

listaFiltrada.forEach(p=>{
(p.responsables||[]).forEach(r=>{
if(r.correo) correos.push(r.correo);
});
});

let texto = correos.join("; ");

navigator.clipboard.writeText(texto);

alert("Correos copiados");
};

cargarProyectos();

</script>

</body>
</html>
