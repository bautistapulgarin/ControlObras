<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Obras</title>

<style>
body { font-family: Arial; padding: 20px; }
input, select { display: block; margin: 5px 0; padding: 8px; width: 300px; }
button { margin-top: 5px; padding: 6px; cursor: pointer; }

.proyecto {
    border: 1px solid #2c3e50;
    padding: 10px;
    margin-top: 10px;
    background: #f4f6f8;
}

/* Modal */
#modalResponsable {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

.modal-content {
    background:white;
    padding:20px;
    margin:10% auto;
    width:300px;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>Registro de Proyecto</h2>

<input type="text" id="nombreProyecto" placeholder="Nombre del proyecto">
<input type="text" id="ubicacion" placeholder="Ubicación">
<input type="text" id="tipoVivienda" placeholder="Tipo de vivienda">

<button onclick="guardarProyecto()">Guardar Proyecto</button>

<hr>

<h3>Proyectos registrados</h3>
<div id="listaProyectos"></div>

<!-- 🔹 MODAL -->
<div id="modalResponsable">
  <div class="modal-content">
    
    <h3>Agregar Responsable</h3>

    <input type="text" id="modalNombre" placeholder="Nombre">
    
    <select id="modalCargo">
      <option value="">Selecciona cargo</option>
      <option>Gerente de Construcción</option>
      <option>Subgerente de Construcción</option>
      <option>Director de Obra</option>
      <option>Residente de obra</option>
      <option>Residente Administrativo</option>
      <option>Residente de Control</option>
      <option>Residente BIM</option>
      <option>SYST</option>
    </select>

    <input type="email" id="modalCorreo" placeholder="Correo">

    <br>

    <button onclick="guardarDesdeModal()">Guardar</button>
    <button onclick="cerrarModal()">Cancelar</button>

  </div>
</div>

<script type="module">

// 🔹 IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    addDoc, 
    getDocs, 
    updateDoc, 
    doc, 
    arrayUnion, 
    arrayRemove 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔹 CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyBYtDX-iqSpAIRtDRnp8c-2XLhmPyR-ePU",
    authDomain: "controlobras-5411a-85cf2.firebaseapp.com",
    projectId: "controlobras-5411a-85cf2",
    storageBucket: "controlobras-5411a-85cf2.firebasestorage.app",
    messagingSenderId: "439125911053",
    appId: "1:439125911053:web:f93c17f3498d70ad9e5744"
};

// 🔹 INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔹 VARIABLE GLOBAL
let proyectoActual = null;

// 🔹 GUARDAR PROYECTO
window.guardarProyecto = async function () {

    const nombreProyecto = document.getElementById("nombreProyecto").value;
    const ubicacion = document.getElementById("ubicacion").value;
    const tipoVivienda = document.getElementById("tipoVivienda").value;

    if (!nombreProyecto || !ubicacion || !tipoVivienda) {
        alert("Completa todos los campos");
        return;
    }

    try {
        await addDoc(collection(db, "proyectos"), {
            nombreProyecto,
            ubicacion,
            tipoVivienda,
            responsables: [],
            fecha: new Date()
        });

        alert("Proyecto guardado");

        document.getElementById("nombreProyecto").value = "";
        document.getElementById("ubicacion").value = "";
        document.getElementById("tipoVivienda").value = "";

        cargarProyectos();

    } catch (error) {
        console.error(error);
        alert("Error al guardar");
    }
};

// 🔹 CARGAR PROYECTOS
async function cargarProyectos() {

    const contenedor = document.getElementById("listaProyectos");
    contenedor.innerHTML = "Cargando...";

    try {
        const querySnapshot = await getDocs(collection(db, "proyectos"));

        contenedor.innerHTML = "";

        if (querySnapshot.empty) {
            contenedor.innerHTML = "No hay proyectos aún";
            return;
        }

        querySnapshot.forEach((docSnap) => {

            const data = docSnap.data();
            const id = docSnap.id;

            let responsablesHTML = "";

            if (data.responsables && data.responsables.length > 0) {
                data.responsables.forEach(r => {
                    responsablesHTML += `
                        <li>
                            ${r.nombre} - ${r.cargo}
                            <button onclick='eliminarResponsable("${id}", "${r.nombre}", "${r.cargo}", "${r.correo}")'>
                                ❌
                            </button>
                        </li>
                    `;
                });
            } else {
                responsablesHTML = "<li>Sin responsables</li>";
            }

            const div = document.createElement("div");
            div.classList.add("proyecto");

            div.innerHTML = `
                <strong>${data.nombreProyecto}</strong><br>
                ${data.ubicacion} - ${data.tipoVivienda}<br><br>

                <button onclick="abrirModal('${id}')">
                    ➕ Agregar responsable
                </button>

                <ul>${responsablesHTML}</ul>
            `;

            contenedor.appendChild(div);
        });

    } catch (error) {
        console.error(error);
        contenedor.innerHTML = "Error al cargar datos";
    }
}

// 🔹 MODAL
window.abrirModal = function(idProyecto) {
    proyectoActual = idProyecto;
    document.getElementById("modalResponsable").style.display = "block";
};

window.cerrarModal = function() {
    document.getElementById("modalResponsable").style.display = "none";

    document.getElementById("modalNombre").value = "";
    document.getElementById("modalCargo").value = "";
    document.getElementById("modalCorreo").value = "";
};

// 🔹 GUARDAR DESDE MODAL
window.guardarDesdeModal = async function () {

    const nombre = document.getElementById("modalNombre").value;
    const cargo = document.getElementById("modalCargo").value;
    const correo = document.getElementById("modalCorreo").value;

    if (!nombre || !cargo || !correo) {
        alert("Completa todos los campos");
        return;
    }

    const ref = doc(db, "proyectos", proyectoActual);

    try {
        await updateDoc(ref, {
            responsables: arrayUnion({ nombre, cargo, correo })
        });

        cerrarModal();
        cargarProyectos();

    } catch (error) {
        console.error(error);
        alert("Error al guardar");
    }
};

// 🔹 ELIMINAR RESPONSABLE
window.eliminarResponsable = async function (idProyecto, nombre, cargo, correo) {

    const ref = doc(db, "proyectos", idProyecto);

    try {
        await updateDoc(ref, {
            responsables: arrayRemove({ nombre, cargo, correo })
        });

        cargarProyectos();

    } catch (error) {
        console.error(error);
        alert("Error al eliminar responsable");
    }
};

// 🔹 INICIO
cargarProyectos();

</script>

</body>
</html>
